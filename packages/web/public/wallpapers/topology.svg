<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Topographic contour lines -->
  <g fill="none" stroke="#d97706" stroke-width="0.8" opacity="0.12">
    <!-- Cluster 1 -->
    <ellipse cx="500" cy="400" rx="80" ry="60"/>
    <ellipse cx="500" cy="400" rx="130" ry="100"/>
    <ellipse cx="500" cy="400" rx="190" ry="145"/>
    <ellipse cx="500" cy="400" rx="260" ry="195"/>
    <ellipse cx="500" cy="400" rx="340" ry="250"/>
    <ellipse cx="500" cy="400" rx="430" ry="310"/>
    <!-- Cluster 2 -->
    <ellipse cx="1400" cy="350" rx="70" ry="55"/>
    <ellipse cx="1400" cy="350" rx="120" ry="90"/>
    <ellipse cx="1400" cy="350" rx="180" ry="130"/>
    <ellipse cx="1400" cy="350" rx="250" ry="180"/>
    <ellipse cx="1400" cy="350" rx="330" ry="235"/>
    <!-- Cluster 3 -->
    <ellipse cx="900" cy="750" rx="90" ry="65"/>
    <ellipse cx="900" cy="750" rx="150" ry="110"/>
    <ellipse cx="900" cy="750" rx="220" ry="160"/>
    <ellipse cx="900" cy="750" rx="300" ry="215"/>
    <ellipse cx="900" cy="750" rx="390" ry="275"/>
  </g>
  <!-- Accent dots -->
  <g fill="#f59e0b" opacity="0.15">
    <circle cx="500" cy="400" r="6"/><circle cx="1400" cy="350" r="5"/>
    <circle cx="900" cy="750" r="6"/>
  </g>
</svg>
