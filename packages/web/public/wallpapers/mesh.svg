<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="m1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="m2" cx="80%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="m3" cx="50%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#m1)"/>
  <rect width="1920" height="1080" fill="url(#m2)"/>
  <rect width="1920" height="1080" fill="url(#m3)"/>
  <!-- Grid overlay -->
  <g stroke="#5eead4" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="0" x2="0" y2="1080"/><line x1="120" y1="0" x2="120" y2="1080"/>
    <line x1="240" y1="0" x2="240" y2="1080"/><line x1="360" y1="0" x2="360" y2="1080"/>
    <line x1="480" y1="0" x2="480" y2="1080"/><line x1="600" y1="0" x2="600" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/><line x1="840" y1="0" x2="840" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/><line x1="1080" y1="0" x2="1080" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/><line x1="1320" y1="0" x2="1320" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/><line x1="1560" y1="0" x2="1560" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/><line x1="1800" y1="0" x2="1800" y2="1080"/>
    <line x1="1920" y1="0" x2="1920" y2="1080"/>
    <line x1="0" y1="0" x2="1920" y2="0"/><line x1="0" y1="120" x2="1920" y2="120"/>
    <line x1="0" y1="240" x2="1920" y2="240"/><line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="480" x2="1920" y2="480"/><line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="720" x2="1920" y2="720"/><line x1="0" y1="840" x2="1920" y2="840"/>
    <line x1="0" y1="960" x2="1920" y2="960"/><line x1="0" y1="1080" x2="1920" y2="1080"/>
  </g>
  <!-- Glow dots at intersections -->
  <g fill="#5eead4" opacity="0.15">
    <circle cx="480" cy="360" r="4"/><circle cx="960" cy="240" r="5"/>
    <circle cx="1440" cy="480" r="4"/><circle cx="240" cy="720" r="3"/>
    <circle cx="720" cy="600" r="5"/><circle cx="1200" cy="840" r="4"/>
    <circle cx="1680" cy="360" r="3"/><circle cx="360" cy="480" r="4"/>
    <circle cx="1080" cy="600" r="5"/><circle cx="600" cy="840" r="3"/>
  </g>
</svg>
