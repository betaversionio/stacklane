<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#tbg)"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Screen area -->
  <rect x="16" y="20" width="88" height="80" rx="6" fill="#0D0D0D"/>
  <!-- Title bar -->
  <rect x="16" y="20" width="88" height="16" rx="6" fill="#2D2D2D"/>
  <rect x="16" y="30" width="88" height="6" fill="#2D2D2D"/>
  <!-- Traffic lights -->
  <circle cx="28" cy="28" r="3.5" fill="#FF5F57"/>
  <circle cx="38" cy="28" r="3.5" fill="#FFBD2E"/>
  <circle cx="48" cy="28" r="3.5" fill="#28CA41"/>
  <!-- Prompt -->
  <text x="28" y="56" font-family="monospace" font-size="18" font-weight="bold" fill="#28CA41">$</text>
  <text x="42" y="56" font-family="monospace" font-size="18" fill="#CCCCCC">~</text>
  <!-- Cursor block -->
  <rect x="28" y="64" width="9" height="14" rx="1" fill="#28CA41" opacity="0.8"/>
</svg>
