<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="nbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#FBC02D"/>
    </linearGradient>
    <linearGradient id="pen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#nbg)"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  <!-- Paper -->
  <rect x="24" y="18" width="62" height="82" rx="4" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Paper lines -->
  <line x1="32" y1="34" x2="78" y2="34" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="32" y1="44" x2="78" y2="44" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="32" y1="54" x2="78" y2="54" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="32" y1="64" x2="78" y2="64" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="32" y1="74" x2="78" y2="74" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="32" y1="84" x2="78" y2="84" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Written text illusion -->
  <line x1="32" y1="34" x2="68" y2="34" stroke="#555" stroke-width="1.2"/>
  <line x1="32" y1="44" x2="72" y2="44" stroke="#555" stroke-width="1.2"/>
  <line x1="32" y1="54" x2="58" y2="54" stroke="#555" stroke-width="1.2"/>
  <!-- Pen -->
  <g transform="translate(72, 50) rotate(35)">
    <rect x="-4" y="-40" width="8" height="48" rx="2" fill="url(#pen)"/>
    <polygon points="-4,8 4,8 0,16" fill="#333"/>
    <rect x="-4" y="-40" width="8" height="8" rx="2" fill="#E64A19" opacity="0.5"/>
    <!-- Pen band -->
    <rect x="-4" y="-8" width="8" height="3" fill="#FFD54F"/>
  </g>
</svg>
