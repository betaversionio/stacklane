<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="needle1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <linearGradient id="needle2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#bbg)"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Compass outer ring -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Cardinal ticks -->
  <text x="60" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">N</text>
  <text x="60" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">S</text>
  <text x="96" y="63" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">E</text>
  <text x="24" y="63" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">W</text>
  <!-- Minor ticks -->
  <line x1="60" y1="22" x2="60" y2="30" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="60" y1="90" x2="60" y2="98" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="22" y1="60" x2="30" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="90" y1="60" x2="98" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Compass needle - red (NE) -->
  <polygon points="60,60 48,42 72,78" fill="url(#needle1)" opacity="0.9"/>
  <!-- Compass needle - white (SW) -->
  <polygon points="60,60 72,78 48,78" fill="url(#needle2)" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="3" fill="white"/>
</svg>
