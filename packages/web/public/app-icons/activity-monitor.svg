<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#abg)"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="20" y1="40" x2="100" y2="40" stroke="#333" stroke-width="0.5"/>
  <line x1="20" y1="55" x2="100" y2="55" stroke="#333" stroke-width="0.5"/>
  <line x1="20" y1="70" x2="100" y2="70" stroke="#333" stroke-width="0.5"/>
  <line x1="20" y1="85" x2="100" y2="85" stroke="#333" stroke-width="0.5"/>
  <line x1="40" y1="30" x2="40" y2="95" stroke="#333" stroke-width="0.5"/>
  <line x1="60" y1="30" x2="60" y2="95" stroke="#333" stroke-width="0.5"/>
  <line x1="80" y1="30" x2="80" y2="95" stroke="#333" stroke-width="0.5"/>
  <!-- Pulse line -->
  <polyline points="18,68 30,68 36,68 42,50 48,78 54,38 60,72 66,55 72,62 78,45 84,60 90,52 96,58 102,58"
    fill="none" stroke="url(#pulse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow effect on pulse -->
  <polyline points="18,68 30,68 36,68 42,50 48,78 54,38 60,72 66,55 72,62 78,45 84,60 90,52 96,58 102,58"
    fill="none" stroke="#00E676" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>
</svg>
